    <h1>Űrlapok</h1>
        <div>
            <form>
                <fieldset>
                    <legend>Személyes Adatok</legend>
                    <div>
                        <label for="name">Név:</label>
                        <input id="name" name="name" type="text" required>
                    </div>
                    <div>
                        <label for="email">E-mail:</label>
                        <input id="email" name="adress" type="text" required>
                    </div>
                    <div>
                        <label for="address">Cím:</label>
                        <input id="address" name="address" type="text" required>
                    </div>
                    <div>
                        <label for="comment">Megjegyzés:</label>
                        <textarea name="comment" id="comment" rows="5"></textarea>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Checkbox</legend>
                    <div>
                        <input checked id="nothing" name="checkbox" type="radio" value="0">
                        <label for="nothing">Nothing</label>
                    </div>
                    <div>
                        <input id="cb01" name="checkbox" type="radio" value="300">
                        <label for="cb01">01</label>
                    </div>
                    <div>
                        <input id="cb02" name="checkbox" type="radio" value="600">
                        <label for="cb02">02</label>
                    </div>
                    <div>
                        <input id="cb03" name="checkbox" type="radio" value="1000">
                        <label for="cb03">03</label>
                    </div>    
                </fieldset>
            </form>
        </div>

    <h3>Tagek</h3>
    <div>
        <ul>
            <li>címke =label</li>
            <li>input =mező</li>
            <li>címke mezőhöz kötése =for</li>
            <li>checkbox</li>
            <li>radio</li>
            <li>kártya =fieldset</li>
            <li>kártyacím =legend</li>

        </ul>
    </div>
