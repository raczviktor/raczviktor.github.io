    <h1>Számrendszerek</h1>
    <p>2es számrendszer: 01
        <br>3as számrendszer: 012
        <br>10es számrendszer: 0123456789
        <br>16os számrendszer: 0123456789ABCDEF
        <br>
        <br>255 (10) =  FF (16)
        <br>
        <br>(10) 255 = 2*100 + 5*10 + 5*1
        <br>(16) FF= F*16 + F*1 = 15*16 + 15*1 = 255 
    </p>
